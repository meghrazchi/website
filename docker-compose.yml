services:
  personal-website:
    build:
      context: .
      dockerfile: Dockerfile
    image: personal-website:latest
    container_name: personal-website
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3000}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
